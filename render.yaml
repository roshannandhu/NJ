# Render.com one-click blueprint. In the Render dashboard: New → Blueprint →
# point it at this repo. It provisions a free Postgres DB and a Docker web
# service wired together. After the first deploy, set NJ_BOOTSTRAP_ADMIN_USER /
# NJ_BOOTSTRAP_ADMIN_PASSWORD (marked sync:false below) in the service's
# Environment tab, then redeploy once to create your admin login.
services:
  - type: web
    name: nj-india-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NJ_AUTH_REQUIRED
        value: "1"
      - key: NJ_JWT_SECRET
        generateValue: true          # Render generates a strong random secret
      - key: DATABASE_URL
        fromDatabase:
          name: nj-india-db
          property: connectionString
      - key: NJ_BOOTSTRAP_ADMIN_USER
        sync: false                   # set in the dashboard (not stored in git)
      - key: NJ_BOOTSTRAP_ADMIN_PASSWORD
        sync: false

databases:
  - name: nj-india-db
    plan: free
