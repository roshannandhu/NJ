<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NJ India — Quotation & Warranty System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg: #faf8f4;
  --bg-warm: #f4efe6;
  --surface: #ffffff;
  --ink: #1a1a1a;
  --ink-mid: #4a463f;
  --ink-soft: #8a857a;
  --line: #e5e1d8;
  --line-soft: #efeae0;
  --accent: #c2410c;
  --accent-soft: #fef3e9;
  --accent-deep: #7c2d12;
  --gold: #b8862a;
  --green: #4a6b3a;
  --red: #a3392d;
  --shadow-sm: 0 1px 2px rgba(60, 50, 30, 0.04);
  --shadow-md: 0 4px 20px rgba(60, 50, 30, 0.06);
  --shadow-lg: 0 20px 60px rgba(60, 50, 30, 0.12);
  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 16px;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  font-family: var(--font-body);
  color: var(--ink);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; font-size: 14px; }
input:focus, select:focus, textarea:focus { outline: none; }

/* ============ APP SHELL ============ */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: #1a1a1a;
  color: #d9d4c7;
  padding: 28px 0;
  border-right: 1px solid #2a2a2a;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.brand {
  padding: 0 28px 28px;
  border-bottom: 1px solid #2a2a2a;
}
.brand .logo {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: #faf8f4;
  line-height: 1;
}
.brand .logo .dot { color: var(--accent); }
.brand .tag {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #8a857a;
  margin-top: 8px;
}

.nav {
  padding: 20px 16px;
  flex: 1;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 14px;
  color: #a8a298;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 2px;
  width: 100%;
  text-align: left;
}
.nav-item:hover { background: #252525; color: #f0ebe1; }
.nav-item.active { background: #faf8f4; color: #1a1a1a; }
.nav-item.active .nav-icon { stroke: #1a1a1a; }
.nav-icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.5; fill: none; flex-shrink: 0; }

.sidebar-footer {
  padding: 20px 28px;
  border-top: 1px solid #2a2a2a;
  font-size: 11px;
  color: #6a6558;
  line-height: 1.6;
}

/* ============ MAIN CONTENT ============ */
.main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(10px);
  background: rgba(250, 248, 244, 0.92);
}

.page-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.page-sub {
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 2px;
  letter-spacing: 0.02em;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.btn-cart {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.btn-cart:hover { border-color: var(--ink-soft); }
.btn-cart .cart-icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }
.cart-badge {
  background: var(--accent);
  color: white;
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 100px;
  font-weight: 600;
  min-width: 20px;
  text-align: center;
}

.content {
  padding: 32px 40px 80px;
  flex: 1;
}

/* ============ HOME — CUSTOMER ENTRY ============ */
.customer-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-bottom: 28px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  box-shadow: var(--shadow-sm);
}
.customer-card .field-block { display: flex; flex-direction: column; gap: 6px; }
.customer-card label {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 500;
}
.customer-card input {
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 6px 0 8px;
  background: transparent;
  font-size: 15px;
  color: var(--ink);
  transition: border-color 0.2s;
}
.customer-card input:focus { border-color: var(--accent); }
.customer-card input::placeholder { color: var(--ink-soft); opacity: 0.5; }

/* ============ CLASS GRID ============ */
.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}
.section-header h2 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.section-header .meta {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

.class-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}

.class-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.class-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--ink-soft);
}
.class-card .card-image {
  height: 180px;
  background: var(--bg-warm);
  position: relative;
  overflow: hidden;
}
.class-card .card-image svg { width: 100%; height: 100%; }
.class-card .card-body {
  padding: 18px 22px 22px;
}
.class-card .card-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 6px;
}
.class-card .card-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.class-card .card-desc {
  font-size: 12px;
  color: var(--ink-mid);
  line-height: 1.55;
}
.class-card .card-arrow {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 36px;
  height: 36px;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  transition: all 0.2s;
}
.class-card:hover .card-arrow { background: var(--accent); }
.class-card:hover .card-arrow svg { stroke: white; transform: translateX(2px); }
.class-card .card-arrow svg { width: 14px; height: 14px; stroke: var(--ink); stroke-width: 2; fill: none; transition: all 0.2s; }

/* ============ VARIETY VIEW ============ */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--ink-mid);
  margin-bottom: 20px;
  padding: 6px 0;
}
.back-btn:hover { color: var(--accent); }
.back-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

.variety-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  margin-top: 24px;
}

.variety-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.variety-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
.variety-card .v-image {
  height: 140px;
  background: var(--bg-warm);
}
.variety-card .v-image svg { width: 100%; height: 100%; }
.variety-card .v-body { padding: 14px 18px 16px; }
.variety-card .v-name {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
}
.variety-card .v-price {
  font-size: 13px;
  color: var(--accent-deep);
  font-weight: 500;
}
.variety-card .v-unit {
  font-size: 11px;
  color: var(--ink-soft);
  margin-left: 4px;
}

/* ============ VARIETY DETAIL ============ */
.detail-layout {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 32px;
  margin-top: 24px;
}
.detail-image {
  background: var(--bg-warm);
  border-radius: var(--radius-lg);
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.detail-image svg { width: 100%; height: 100%; }

.detail-content h1 {
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 10px;
}
.detail-content .detail-class {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 16px;
}
.detail-content .detail-desc {
  font-size: 14px;
  color: var(--ink-mid);
  line-height: 1.7;
  margin-bottom: 24px;
}
.detail-content .price-tag {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}
.detail-content .price-tag .unit {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--ink-soft);
  font-weight: 400;
  letter-spacing: 0.02em;
}

.color-section { margin: 24px 0; }
.color-section h4 {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 500;
  margin-bottom: 12px;
}
.color-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px;
}
.color-swatch {
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  background: var(--surface);
}
.color-swatch:hover { border-color: var(--accent); }
.color-swatch.selected { border-color: var(--accent); background: var(--accent-soft); }
.color-swatch .swatch {
  height: 40px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.color-swatch .name { font-size: 11px; font-weight: 500; }
.color-swatch .offset { font-size: 10px; color: var(--ink-soft); margin-top: 2px; }

.qty-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 24px 0;
}
.qty-control {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.qty-control button {
  width: 36px;
  height: 40px;
  background: var(--surface);
  font-size: 16px;
  color: var(--ink-mid);
}
.qty-control button:hover { background: var(--bg-warm); }
.qty-control input {
  width: 72px;
  height: 40px;
  border: none;
  text-align: center;
  font-size: 15px;
  font-weight: 500;
  background: transparent;
  border-left: 1px solid var(--line);
  border-right: 1px solid var(--line);
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 28px;
  background: var(--ink);
  color: var(--bg);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
  border-radius: var(--radius-sm);
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { background: var(--accent); }
.btn-primary svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 20px;
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--ink); }
.btn-ghost {
  padding: 9px 16px;
  font-size: 13px;
  color: var(--ink-mid);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { background: var(--bg-warm); }

/* ============ CART DRAWER ============ */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 18, 12, 0.4);
  z-index: 999;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s;
}
.cart-overlay.open { opacity: 1; visibility: visible; }

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 440px;
  background: var(--bg);
  z-index: 1000;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  box-shadow: -10px 0 40px rgba(0, 0, 0, 0.1);
}
.cart-drawer.open { transform: translateX(0); }

.cart-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.cart-header h2 {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.cart-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cart-close:hover { background: var(--bg-warm); }
.cart-close svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

.cart-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.cart-empty {
  padding: 60px 28px;
  text-align: center;
  color: var(--ink-soft);
}
.cart-empty svg {
  width: 48px;
  height: 48px;
  stroke: var(--ink-soft);
  stroke-width: 1;
  fill: none;
  margin-bottom: 16px;
  opacity: 0.4;
}
.cart-empty p { font-size: 14px; }

.cart-item {
  padding: 16px 28px;
  border-bottom: 1px solid var(--line-soft);
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 14px;
  align-items: center;
}
.cart-item .item-img {
  width: 60px;
  height: 60px;
  background: var(--bg-warm);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cart-item .item-info .name {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 2px;
}
.cart-item .item-info .meta {
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.cart-item .item-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cart-item .qty-mini {
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
}
.cart-item .qty-mini button {
  width: 24px;
  height: 26px;
  font-size: 13px;
  background: var(--surface);
}
.cart-item .qty-mini input {
  width: 40px;
  height: 26px;
  border: none;
  text-align: center;
  font-size: 12px;
  border-left: 1px solid var(--line);
  border-right: 1px solid var(--line);
  background: transparent;
}
.cart-item .item-price {
  text-align: right;
}
.cart-item .item-price .total {
  font-weight: 600;
  font-size: 14px;
}
.cart-item .item-price .remove {
  font-size: 11px;
  color: var(--red);
  margin-top: 4px;
  cursor: pointer;
}

.cart-footer {
  border-top: 1px solid var(--line);
  padding: 20px 28px 24px;
  background: var(--surface);
}
.cart-total {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}
.cart-total span:first-child {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.cart-total .total-amount {
  font-family: var(--font-display);
  font-size: 30px;
  font-weight: 500;
  color: var(--ink);
}
.cart-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.cart-actions .btn-primary { padding: 14px; width: 100%; }
.cart-actions .btn-secondary { padding: 14px; width: 100%; }

/* ============ SETTINGS ============ */
.settings-tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 28px;
}
.settings-tab {
  padding: 12px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-soft);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.settings-tab.active {
  color: var(--ink);
  border-color: var(--accent);
}
.settings-tab:hover { color: var(--ink); }

.settings-section {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-bottom: 20px;
}
.settings-section h3 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.settings-section .sub {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 20px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.form-grid.full > * { grid-column: span 2; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-field.full { grid-column: span 2; }
.form-field label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 500;
}
.form-field input, .form-field select, .form-field textarea {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  background: var(--surface);
  font-size: 14px;
  transition: border-color 0.15s;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  border-color: var(--accent);
}
.form-field textarea { min-height: 120px; resize: vertical; font-family: inherit; }
.form-field .hint { font-size: 11px; color: var(--ink-soft); }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--line-soft);
}
.toggle-row:last-child { border-bottom: none; }
.toggle-row .toggle-label .name { font-size: 14px; font-weight: 500; }
.toggle-row .toggle-label .desc { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

.toggle {
  width: 40px;
  height: 22px;
  background: var(--line);
  border-radius: 100px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;

function loadData() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      const parsed = JSON.parse(stored);
      return {
        ...DEFAULT_DATA,
        ...parsed,
        company: { ...DEFAULT_DATA.company, ...(parsed.company || {}) },
        settings: { ...DEFAULT_DATA.settings, ...(parsed.settings || {}) },
        warranties: { ...DEFAULT_DATA.warranties, ...(parsed.warranties || {}) }
      };
    }
  } catch(e) { console.error(e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  try {
    const serialized = JSON.stringify(DATA);
    localStorage.setItem(STORAGE_KEY, serialized);
    const bytes = new Blob([serialized]).size;
    if (bytes > 4 * 1024 * 1024) {
      toast('Warning: Storage at ' + (bytes / 1024 / 1024).toFixed(1) + ' MB — export a backup soon');
    }
  } catch(e) {
    console.error(e);
    toast('Storage full — export a backup from Settings and clear old data');
  }
}

// ============ UTILITY ============
function $(id) { return document.getElementById(id); }
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  Object.assign(e, props);
  children.flat().forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function escapeHTML(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatINR(n) {
  return '₹' + Math.round(n).toLocaleString('en-IN');
}
function uid() { return 'id_' + Math.random().toString(36).slice(2, 10); }

function toast(msg, type) {
  if (!type) {
    if (/fail|error|wrong|invalid|full|not found/i.test(msg)) type = 'error';
    else if (/warn|limit|required|empty|first|approaching|missing/i.test(msg)) type = 'warning';
    else type = 'success';
  }
  const icons = {
    success: '<polyline points="20 6 9 17 4 12"/>',
    error: '<path d="M18 6L6 18M6 6l12 12"/>',
    warning: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
    info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'
  };
  const strokeColors = { success: '#4a6b3a', error: '#e53e3e', warning: '#d69e2e', info: '#3182ce' };
  const t = $('toast');
  $('toastIcon').innerHTML = icons[type] || icons.success;
  $('toastIcon').style.stroke = strokeColors[type] || strokeColors.success;
  $('toastMsg').textContent = msg;
  t.className = 'toast ' + type;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), type === 'error' ? 4000 : 3000);
  requestAnimationFrame(() => { t.classList.remove('show'); requestAnimationFrame(() => t.classList.add('show')); });
}

function placeholderSVG(label, color = '#7c4a2d', pattern = 'shingle') {
  const patterns = {
    shingle: `<defs><pattern id="p1" patternUnits="userSpaceOnUse" width="40" height="20"><rect width="40" height="20" fill="${color}"/><path d="M0 20 L20 5 L40 20" stroke="${color}AA" stroke-width="1" fill="none"/></pattern></defs><rect width="100%" height="100%" fill="url(#p1)"/>`,
    tile: `<defs><pattern id="p2" patternUnits="userSpaceOnUse" width="30" height="30"><rect width="30" height="30" fill="${color}"/><circle cx="15" cy="15" r="6" fill="${color}DD"/></pattern></defs><rect width="100%" height="100%" fill="url(#p2)"/>`,
    stone: `<defs><pattern id="p3" patternUnits="userSpaceOnUse" width="50" height="25"><rect width="50" height="25" fill="${color}"/><path d="M0 0 Q25 25 50 0" stroke="${color}AA" stroke-width="2" fill="none"/></pattern></defs><rect width="100%" height="100%" fill="url(#p3)"/>`,
    ceiling: `<defs><pattern id="p4" patternUnits="userSpaceOnUse" width="20" height="60"><rect width="20" height="60" fill="${color}"/><line x1="0" y1="0" x2="0" y2="60" stroke="${color}DD" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(#p4)"/>`,
    tools: `<rect width="100%" height="100%" fill="${color}"/><g transform="translate(50%, 50%)"><path d="M-20 0 L20 0 M0 -20 L0 20" stroke="white" stroke-width="3" stroke-linecap="round"/></g>`
  };
  return `<svg viewBox="0 0 300 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    ${patterns[pattern] || patterns.shingle}
    <text x="20" y="180" fill="white" font-family="serif" font-size="14" font-weight="500" opacity="0.85" style="text-shadow:0 1px 2px rgba(0,0,0,0.4);">${label}</text>
  </svg>`;
}
function getClassPattern(cls) {
  if (!cls) return 'shingle';
  if (cls.id === 'cls_shingles' || cls.id === 'cls_docke') return 'shingle';
  if (cls.id === 'cls_ceramic') return 'tile';
  if (cls.id === 'cls_stone') return 'stone';
  if (cls.id === 'cls_heatout') return 'ceiling';
  if (cls.type === 'tools') return 'tools';
  return 'shingle';
}

// ============ NAVIGATION ============
function navigate(page) {
  APP_STATE.page = page;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  switch(page) {
    case 'home': renderHome(); break;
    case 'new': renderHome(); break;
    case 'quotations': renderQuotationHistory(); break;
    case 'warranties': renderWarrantyHistory(); break;
    case 'settings': renderSettings(); break;
  }
}

    <div class="field-block">
      <label>Phone</label>
      <input type="text" id="custPhone" placeholder="Optional" value="${escapeHTML(APP_STATE.customer.phone)}" oninput="updateCustomer('phone', this.value)"/>
    </div>
    <div class="field-block">
      <label>Email</label>
      <input type="text" id="custEmail" placeholder="Optional" value="${escapeHTML(APP_STATE.customer.email)}" oninput="updateCustomer('email', this.value)"/>
    </div>
    <div class="field-block">
      <label>Address</label>
      <input type="text" id="custAddr" placeholder="Optional" value="${escapeHTML(APP_STATE.customer.address)}" oninput="updateCustomer('address', this.value)"/>
    </div>
  `;
  content.appendChild(customerCard);

  // Section header
  const header = el('div', { className: 'section-header fade-up' });
  header.innerHTML = `
    <div>
      <h2>Product Classes</h2>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">Select a class to browse varieties</div>
    </div>
    <div class="meta">${DATA.classes.length} Classes</div>
  `;
  content.appendChild(header);

  // Class grid — show only non-tools classes
  const productClasses = DATA.classes.filter(c => c.type !== 'tools');
  const grid = el('div', { className: 'class-grid fade-up' });
  productClasses.forEach((cls, i) => {
    const varietyCount = DATA.varieties.filter(v => v.classId === cls.id).length;
    const card = el('div', { className: 'class-card', onclick: () => selectClass(cls.id) });
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="card-image">${placeholderSVG(cls.subtitle, cls.color, getClassPattern(cls))}</div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
      <div class="card-body">
        <div class="card-label">${varietyCount} varieties</div>
        <div class="card-title">${escapeHTML(cls.name)}</div>
        <div class="card-desc">${escapeHTML(cls.description)}</div>
      </div>
    `;
    grid.appendChild(card);
  });
  content.appendChild(grid);

  // Tools & Accessories quick-add section
  const toolVarieties = DATA.varieties.filter(v => {
    const cls = DATA.classes.find(c => c.id === v.classId);
    return cls && cls.type === 'tools';
  });
  if (toolVarieties.length > 0) {
    const toolHeader = el('div', { className: 'section-header', style: 'margin-top:36px;' });
    toolHeader.innerHTML = `
      <div>
        <h2>Tools & Accessories</h2>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">Add accessories directly to cart</div>
      </div>
      <div class="meta">${toolVarieties.length} items</div>
    `;
    content.appendChild(toolHeader);

    const toolGrid = el('div', { style: 'display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;' });
    toolVarieties.forEach(v => {
      const card = el('div', { className: 'tool-card' });
      card.innerHTML = `
        <div class="tool-header">
          <div>
            <div class="tool-name">${escapeHTML(v.name)}</div>
            <div class="tool-desc">${escapeHTML(v.description)}</div>
          </div>
          <div class="tool-price">${formatINR(v.basePrice)}/${v.unit}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="qty-mini" style="display:flex;align-items:center;border:1px solid var(--line);border-radius:4px;overflow:hidden;">
            <button onclick="adjustToolQty('tool_qty_${v.id}', -1)" style="width:28px;height:30px;background:var(--bg-warm);font-size:14px;color:var(--ink-mid);">−</button>
            <input type="number" id="tool_qty_${v.id}" value="1" min="1" style="width:44px;height:30px;border:none;text-align:center;font-size:13px;border-left:1px solid var(--line);border-right:1px solid var(--line);background:transparent;"/>
            <button onclick="adjustToolQty('tool_qty_${v.id}', 1)" style="width:28px;height:30px;background:var(--bg-warm);font-size:14px;color:var(--ink-mid);">+</button>
          </div>
          <button class="btn-primary" onclick="addToolToCart('${v.id}')" style="flex:1;padding:8px 12px;font-size:12px;">Add to Cart</button>
        </div>
      `;
      toolGrid.appendChild(card);
    });
    content.appendChild(toolGrid);
  }

  // Recent quotations
  if (DATA.quotations.length > 0) {
    const recentHeader = el('div', { className: 'section-header', style: 'margin-top:36px;' });
    recentHeader.innerHTML = `
      <div>
        <h2>Recent Quotations</h2>
        <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;">Quick access to the last 5</div>
      </div>
      <button class="btn-ghost" onclick="navigate('quotations')">View All →</button>
    `;
    content.appendChild(recentHeader);

    const recentList = el('div', { className: 'recent-list' });
    DATA.quotations.slice(0, 5).forEach(q => {
      const row = el('div', { className: 'recent-row', onclick: () => reopenQuotation(q.id) });
      const wDone = (q.warrantiesGenerated || []).length;
      const wTotal = (q.warrantyTypes || []).length;
      const wBadge = wTotal > 0
        ? `<span style="font-size:10px;padding:2px 7px;border-radius:100px;background:${wDone>=wTotal?'#dcfce7':'#fef3e9'};color:${wDone>=wTotal?'#16a34a':'#c2410c'};font-weight:500;flex-shrink:0;">W: ${wDone}/${wTotal}</span>`
        : '';
      row.innerHTML = `
        <div class="r-id">${escapeHTML(q.id)}</div>
        <div class="r-name">${escapeHTML(q.customer.name)}</div>
        <div style="display:flex;gap:8px;align-items:center;">${wBadge}</div>
        <div class="r-amount">${formatINR(q.total)}</div>
        <div class="r-date">${new Date(q.date).toLocaleDateString('en-GB')}</div>
      `;
      recentList.appendChild(row);
    });
    content.appendChild(recentList);
  }
}

function updateCustomer(field, value) {
  APP_STATE.customer[field] = value;
  $('cartCustomer').textContent = 'For: ' + (APP_STATE.customer.name || 'Guest');
}

function adjustToolQty(inputId, delta) {
  const inp = $(inputId);
  if (!inp) return;
  inp.value = Math.max(1, (parseInt(inp.value) || 1) + delta);
}

function addToolToCart(varietyId) {
  const v = DATA.varieties.find(x => x.id === varietyId);
  if (!v) return;
  const inp = $('tool_qty_' + varietyId);
  const qty = inp ? Math.max(1, parseInt(inp.value) || 1) : 1;
  APP_STATE.cart.push({
    id: uid(),
    varietyId: v.id,
    classId: v.classId,
    name: v.name,
    unit: v.unit,
    price: v.basePrice,
    qty,
    color: null
  });
  updateCartBadge();
  toast(v.name + ' added to cart');
}

// ============ CLASS SELECTION → VARIETIES ============
function selectClass(classId) {
  APP_STATE.selectedClassId = classId;
  const cls = DATA.classes.find(c => c.id === classId);
  setPageHeader(cls.name, cls.subtitle);

  const content = $('content');
  content.innerHTML = '';

  const back = el('button', { className: 'back-btn', onclick: () => renderHome() });
  back.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> BACK TO CLASSES`;
  content.appendChild(back);

  const header = el('div');
  header.innerHTML = `
    <h1 style="font-family:var(--font-display);font-size:36px;font-weight:400;letter-spacing:-0.02em;margin-bottom:6px;">${escapeHTML(cls.name)}</h1>
    <p style="font-size:14px;color:var(--ink-mid);max-width:600px;line-height:1.7;">${escapeHTML(cls.description)}</p>
  `;
  content.appendChild(header);

  const varieties = DATA.varieties.filter(v => v.classId === classId);
  const grid = el('div', { className: 'variety-grid' });
  varieties.forEach((v, i) => {
    const card = el('div', { className: 'variety-card', onclick: () => selectVariety(v.id) });
    card.style.animation = 'fadeUp 0.3s ease-out both';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="v-image">${placeholderSVG(v.name, cls.color, getClassPattern(cls))}</div>
      <div class="v-body">
        <div class="v-name">${escapeHTML(v.name)}</div>
        <div>
          <span class="v-price">${formatINR(v.basePrice)}</span>
          <span class="v-unit">/${v.unit}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  if (varieties.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--ink-soft);">No varieties yet. Add some in Settings.</div>`;
  }
  content.appendChild(grid);
}

// ============ VARIETY DETAIL ============
function selectVariety(varietyId) {
  const v = DATA.varieties.find(x => x.id === varietyId);
  const cls = DATA.classes.find(c => c.id === v.classId);
  APP_STATE.selectedVarietyId = varietyId;
  APP_STATE.selectedColor = v.colors.length > 0 ? v.colors[0] : null;

  setPageHeader(v.name, cls.name);

  const content = $('content');
  content.innerHTML = '';

  const back = el('button', { className: 'back-btn', onclick: () => selectClass(cls.id) });
  back.innerHTML = `<svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> BACK TO ${cls.name.toUpperCase()}`;
  content.appendChild(back);

  const layout = el('div', { className: 'detail-layout' });
  const imageSide = el('div', { className: 'detail-image', id: 'detailImage' });
  imageSide.innerHTML = placeholderSVG(v.name, APP_STATE.selectedColor ? APP_STATE.selectedColor.hex : cls.color, getClassPattern(cls));

  const contentSide = el('div', { className: 'detail-content' });
  contentSide.innerHTML = `
    <div class="detail-class">${escapeHTML(cls.name)}</div>
    <h1>${escapeHTML(v.name)}</h1>
    <p class="detail-desc">${escapeHTML(v.description)}</p>
    <div class="price-tag" id="priceDisplay">
      ${formatINR(v.basePrice)} <span class="unit">/ ${v.unit}</span>
    </div>
    ${v.colors.length > 0 ? `
    <div class="color-section">
      <h4>Available Colours / Types</h4>
      <div class="color-grid">
        ${v.colors.map((c, i) => `
          <div class="color-swatch ${i === 0 ? 'selected' : ''}" onclick="selectColor(${i})" data-idx="${i}">
            <div class="swatch" style="background:${c.hex};"></div>
            <div class="name">${escapeHTML(c.name)}</div>
            ${c.offset !== 0 ? `<div class="offset">${c.offset > 0 ? '+' : ''}₹${c.offset}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
    ` : ''}
    <div class="qty-section">
      <label style="font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;">Quantity (${v.unit})</label>
      <div class="qty-control">
        <button onclick="adjustQty(-1)">−</button>
        <input type="number" id="qtyInput" value="1" min="1" />
        <button onclick="adjustQty(1)">+</button>
      </div>
    </div>
    <button class="btn-primary" onclick="addToCart()">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Add to Cart
    </button>
  `;

  layout.appendChild(imageSide);
  layout.appendChild(contentSide);
  content.appendChild(layout);
}

function selectColor(idx) {
  const v = DATA.varieties.find(x => x.id === APP_STATE.selectedVarietyId);
  const cls = DATA.classes.find(c => c.id === v.classId);
  APP_STATE.selectedColor = v.colors[idx];
  document.querySelectorAll('.color-swatch').forEach((s, i) => s.classList.toggle('selected', i === idx));
  const price = v.basePrice + v.colors[idx].offset;
  $('priceDisplay').innerHTML = `${formatINR(price)} <span class="unit">/ ${v.unit}</span>`;
  $('detailImage').innerHTML = placeholderSVG(v.name + ' — ' + v.colors[idx].name, v.colors[idx].hex, getClassPattern(cls));
}

function adjustQty(delta) {
  const input = $('qtyInput');
  const cur = parseInt(input.value) || 1;
  input.value = Math.max(1, cur + delta);
}

function addToCart() {
  const v = DATA.varieties.find(x => x.id === APP_STATE.selectedVarietyId);
  const qty = parseInt($('qtyInput').value) || 1;
  const color = APP_STATE.selectedColor;
  const offset = color ? color.offset : 0;
  const price = v.basePrice + offset;

  APP_STATE.cart.push({
    id: uid(),
    varietyId: v.id,
    classId: v.classId,
    name: v.name + (color ? ' — ' + color.name : ''),
    unit: v.unit,
    price,
    qty,
    color: color ? color.hex : null
  });
  updateCartBadge();
  openCart();
  toast(`Added ${v.name} to cart`);
}

// ============ CART ============
function updateCartBadge() {
  const total = APP_STATE.cart.reduce((s, i) => s + i.qty, 0);
  $('cartBadge').textContent = total || 0;
}

function openCart() {
  $('cartCustomer').textContent = 'For: ' + (APP_STATE.customer.name || 'Guest');
  renderCart();
  $('cartDrawer').classList.add('open');
  $('cartOverlay').classList.add('open');
}
function closeCart() {
  $('cartDrawer').classList.remove('open');
  $('cartOverlay').classList.remove('open');
}

function renderCart() {
  const body = $('cartBody');
  body.innerHTML = '';

  if (APP_STATE.cart.length === 0) {
    body.innerHTML = `
      <div class="cart-empty">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <p>Your cart is empty.<br/>Select a product class to begin.</p>
      </div>
    `;
    $('cartTotal').textContent = formatINR(0);
    return;
  }

  let total = 0;
  APP_STATE.cart.forEach((item, idx) => {
    const v = DATA.varieties.find(x => x.id === item.varietyId);
    const cls = DATA.classes.find(c => c.id === item.classId);
    const lineTotal = item.price * item.qty;
    total += lineTotal;
    const row = el('div', { className: 'cart-item' });
    row.innerHTML = `
      <div class="item-img" style="background:${item.color || 'var(--bg-warm)'};">
        ${item.color ? '' : '<div style="font-family:var(--font-display);font-size:11px;color:var(--ink-soft);">' + escapeHTML(cls.name.split(' ')[0]) + '</div>'}
      </div>
      <div class="item-info">
        <div class="name">${escapeHTML(item.name)}</div>
        <div class="meta">${formatINR(item.price)} / ${item.unit}</div>
        <div class="qty-mini">
          <button onclick="adjustCartItem(${idx}, -1)">−</button>
          <input type="number" value="${item.qty}" onchange="setCartQty(${idx}, this.value)" min="1"/>
          <button onclick="adjustCartItem(${idx}, 1)">+</button>
        </div>
      </div>
      <div class="item-price">
        <div class="total">${formatINR(lineTotal)}</div>
        <div class="remove" onclick="removeCartItem(${idx})">Remove</div>
      </div>
    `;
    body.appendChild(row);
  });

  $('cartTotal').textContent = formatINR(total);
}

function adjustCartItem(idx, delta) {
  APP_STATE.cart[idx].qty = Math.max(1, APP_STATE.cart[idx].qty + delta);
  renderCart();
}
function setCartQty(idx, value) {
  APP_STATE.cart[idx].qty = Math.max(1, parseInt(value) || 1);
  renderCart();
}
function removeCartItem(idx) {
  APP_STATE.cart.splice(idx, 1);
  renderCart();
  updateCartBadge();
}

// ============ CHECKOUT ============
function goToCheckout() {
  if (APP_STATE.cart.length === 0) {
    toast('Cart is empty');
    return;
  }
  if (!APP_STATE.customer.name.trim()) {
    toast('Enter customer name first');
    closeCart();
    navigate('home');
    setTimeout(() => { const f = document.getElementById('custName'); if (f) f.focus(); }, 100);
    return;
  }
  closeCart();
  setPageHeader('Review & Generate', 'Confirm details before generating documents');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));

  const content = $('content');
  content.innerHTML = '';

  // Customer details edit
  const custCard = el('div', { className: 'settings-section' });
  custCard.innerHTML = `
    <h3>Customer Details</h3>
    <div class="sub">Confirm or update before generating the document</div>
    <div class="form-grid">
      <div class="form-field">
        <label>Customer Name *</label>
        <input type="text" id="coName" value="${escapeHTML(APP_STATE.customer.name)}" placeholder="Required"/>
      </div>
      <div class="form-field">
        <label>Phone</label>
        <input type="text" id="coPhone" value="${escapeHTML(APP_STATE.customer.phone)}"/>
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="text" id="coEmail" value="${escapeHTML(APP_STATE.customer.email)}"/>
      </div>
      <div class="form-field">
        <label>Address</label>
        <input type="text" id="coAddr" value="${escapeHTML(APP_STATE.customer.address)}"/>
      </div>
    </div>
  `;
  content.appendChild(custCard);

  // Items review
  let subtotal = 0;
  APP_STATE.cart.forEach(item => { subtotal += item.price * item.qty; });

  const itemCard = el('div', { className: 'settings-section' });
  let itemRows = APP_STATE.cart.map((item, i) => `
    <tr style="border-bottom:1px solid var(--line-soft);">
      <td style="padding:12px 0;color:var(--ink-soft);font-size:13px;">${i + 1}</td>
      <td style="padding:12px 8px;">
        <div style="font-weight:500;">${escapeHTML(item.name)}</div>
      </td>
      <td style="padding:12px 8px;font-size:13px;text-align:right;">${item.qty} ${item.unit}</td>
      <td style="padding:12px 8px;font-size:13px;text-align:right;">${formatINR(item.price)}</td>
      <td style="padding:12px 0;font-weight:500;text-align:right;">${formatINR(item.price * item.qty)}</td>
    </tr>
  `).join('');

  const tax = DATA.settings.taxEnabled ? Math.round(subtotal * DATA.settings.taxRate / 100) : 0;
  const grandTotal = subtotal + tax;

  itemCard.innerHTML = `
    <h3>Items</h3>
    <div class="sub">${APP_STATE.cart.length} item${APP_STATE.cart.length > 1 ? 's' : ''} in this order</div>
    <table style="width:100%;border-collapse:collapse;font-size:14px;">
      <thead>
        <tr style="border-bottom:1px solid var(--line);">
          <th style="text-align:left;padding:10px 0;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;width:40px;">#</th>
          <th style="text-align:left;padding:10px 8px;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;">Product</th>
          <th style="text-align:right;padding:10px 8px;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;">Qty</th>
          <th style="text-align:right;padding:10px 8px;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;">Rate</th>
          <th style="text-align:right;padding:10px 0;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500;">Total</th>
        </tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--line);">
      <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;">
        <span>Subtotal</span>
        <span>${formatINR(subtotal)}</span>
      </div>
      ${DATA.settings.discountEnabled ? `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 0;font-size:14px;color:var(--ink-mid);">
        <span>Discount</span>
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
          <input type="number" id="discountPct" min="0" max="100" step="0.5" value="0"
            style="width:60px;text-align:right;border:1px solid var(--line);border-radius:var(--radius-sm);padding:3px 8px;background:var(--surface);"
            oninput="updateCheckoutTotal(${subtotal})" />
          <span style="color:var(--ink-soft);">%</span>
          <span id="discountAmtDisplay" style="min-width:70px;text-align:right;color:var(--red);font-weight:500;"></span>
        </div>
      </div>` : ''}
      ${DATA.settings.taxEnabled ? `
      <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--ink-mid);">
        <span>GST (${DATA.settings.taxRate}%)</span>
        <span id="taxAmtDisplay">${formatINR(tax)}</span>
      </div>` : ''}
      <div style="display:flex;justify-content:space-between;padding:14px 0 4px;border-top:1px solid var(--line);margin-top:10px;font-family:var(--font-display);font-size:22px;font-weight:500;">
        <span>Grand Total</span>
        <span style="color:var(--accent-deep);" id="grandTotalDisplay">${formatINR(grandTotal)}</span>
      </div>
    </div>
  `;
  content.appendChild(itemCard);

  // Warranty info
  const warrantyClasses = [...new Set(APP_STATE.cart.map(i => i.classId))]
    .map(cid => DATA.classes.find(c => c.id === cid))
    .filter(c => c && c.warrantyType);

  if (warrantyClasses.length > 0) {
    const wCard = el('div', { className: 'settings-section' });
    wCard.innerHTML = `
      <h3>Warranties Detected</h3>
      <div class="sub">The following warranty certificates will be available after quotation generation</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        ${warrantyClasses.map(c => `
          <div style="display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg-warm);border-radius:var(--radius-sm);">
            <div style="width:36px;height:36px;background:${c.color};border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-family:var(--font-display);font-size:14px;">${c.name[0]}</div>
            <div style="flex:1;">
              <div style="font-weight:500;">${escapeHTML(c.name)}</div>
              <div style="font-size:12px;color:var(--ink-soft);">${escapeHTML(DATA.warranties[c.warrantyType]?.title || '')}</div>
            </div>
            <div style="font-size:11px;background:var(--accent-soft);color:var(--accent-deep);padding:4px 10px;border-radius:100px;font-weight:500;">${escapeHTML(DATA.warranties[c.warrantyType]?.duration || '')}</div>
          </div>
        `).join('')}
      </div>
    `;
    content.appendChild(wCard);
  }

  // Action buttons

function updateCheckoutTotal(subtotal) {
  const pctInput = document.getElementById('discountPct');
  const pct = pctInput ? Math.max(0, Math.min(100, parseFloat(pctInput.value) || 0)) : 0;
  const discountAmt = Math.round(subtotal * pct / 100);
  const taxableAmt = subtotal - discountAmt;
  const tax = DATA.settings.taxEnabled ? Math.round(taxableAmt * DATA.settings.taxRate / 100) : 0;

  const discountDisplay = document.getElementById('discountAmtDisplay');
  if (discountDisplay) discountDisplay.textContent = pct > 0 ? '− ' + formatINR(discountAmt) : '';

  const taxDisplay = document.getElementById('taxAmtDisplay');
  if (taxDisplay) taxDisplay.textContent = formatINR(tax);

  const totalDisplay = document.getElementById('grandTotalDisplay');
  if (totalDisplay) totalDisplay.textContent = formatINR(taxableAmt + tax);
}

function generateQuotation() {
  const name = $('coName').value.trim();
  if (!name) {
    toast('Customer name is required');
    return;
  }
  APP_STATE.customer.name = name;
  APP_STATE.customer.phone = $('coPhone').value.trim();
  APP_STATE.customer.email = $('coEmail').value.trim();
  APP_STATE.customer.address = $('coAddr').value.trim();

  let subtotal = 0;
  APP_STATE.cart.forEach(item => { subtotal += item.price * item.qty; });

  const discountPctInput = document.getElementById('discountPct');
  const discountPct = DATA.settings.discountEnabled && discountPctInput
    ? Math.max(0, Math.min(100, parseFloat(discountPctInput.value) || 0)) : 0;
  const discount = Math.round(subtotal * discountPct / 100);
  const taxableAmount = subtotal - discount;
  const tax = DATA.settings.taxEnabled ? Math.round(taxableAmount * DATA.settings.taxRate / 100) : 0;
  const total = taxableAmount + tax;

  const qid = DATA.settings.quotationPrefix + '-' + String(DATA.quotations.length + 1).padStart(4, '0');
  const quotation = {
    id: qid,
    date: new Date().toISOString(),
    customer: { ...APP_STATE.customer },
    items: APP_STATE.cart.map(i => ({ ...i })),
    subtotal,
    discount,
    discountPercent: discountPct,
    tax,
    taxRate: DATA.settings.taxRate,
    total,
    warrantyTypes: [...new Set(APP_STATE.cart.map(i => {
      const cls = DATA.classes.find(c => c.id === i.classId);
      return cls?.warrantyType;
    }).filter(Boolean))]
  };
  quotation.warrantiesGenerated = [];
  DATA.quotations.unshift(quotation);
  saveData();
  toast('Quotation ' + qid + ' generated');

  APP_STATE.cart = [];
  updateCartBadge();
  showQuotationDocument(quotation);
}

async function downloadQuotationPDF(qid) {
  const q = DATA.quotations.find(x => x.id === qid);
  if (!q) return;
  toast('Generating PDF...');

  const docEl = document.getElementById('quotationDoc');
  if (!docEl) return;

  try {
    const canvas = await html2canvas(docEl, { scale: 2, useCORS: true, backgroundColor: '#fff' });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

    let position = 0;
    let heightLeft = pdfHeight;
    pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
    heightLeft -= pdf.internal.pageSize.getHeight();

    while (heightLeft > 0) {
      position -= pdf.internal.pageSize.getHeight();
      pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
      heightLeft -= pdf.internal.pageSize.getHeight();
    }

    pdf.save(`${q.id}_${q.customer.name.replace(/\s+/g, '_')}.pdf`);
    toast('PDF downloaded');
  } catch (e) {
    console.error(e);
    toast('PDF generation failed');
  }
}

function filterHistory(query) {
  const q = (query || '').toLowerCase().trim();
  const rows = document.querySelectorAll('.history-row');
  let visibleCount = 0;
  rows.forEach(row => {
    const s = (row.getAttribute('data-search') || '').toLowerCase();
    const visible = !q || s.includes(q);
    row.style.display = visible ? '' : 'none';
    if (visible) visibleCount++;
  });
  const noResults = document.getElementById('historyNoResults');
  if (noResults) noResults.style.display = visibleCount === 0 && q ? '' : 'none';
}

function renderSettings() {

  tabList.forEach(t => {

function editVariety(classId, varietyId) {
  const isNew = !varietyId;
  const v = isNew ? { id: uid(), classId, name: '', description: '', basePrice: 0, unit: 'sqft', image: '', colors: [] } : DATA.varieties.find(x => x.id === varietyId);

  const colorsHTML = v.colors.map((c, i) => `
    <div style="display:grid;grid-template-columns:36px 1fr 80px 30px;gap:8px;margin-bottom:6px;align-items:center;">
      <input type="color" value="${c.hex}" data-color-idx="${i}" data-color-field="hex" style="height:36px;width:36px;border:1px solid var(--line);border-radius:4px;padding:2px;"/>
      <input type="text" value="${escapeHTML(c.name)}" placeholder="Colour name" data-color-idx="${i}" data-color-field="name" style="padding:8px 10px;border:1px solid var(--line);border-radius:4px;"/>
      <input type="number" value="${c.offset}" placeholder="±₹" data-color-idx="${i}" data-color-field="offset" style="padding:8px 10px;border:1px solid var(--line);border-radius:4px;"/>
      <button onclick="this.parentNode.remove()" style="color:var(--red);">×</button>
    </div>
  `).join('');

  showModal('Variety — ' + (isNew ? 'New' : 'Edit'), `
    <div class="form-grid">
      <div class="form-field full">
        <label>Variety Name *</label>
        <input type="text" id="vName" value="${escapeHTML(v.name)}"/>
      </div>
      <div class="form-field full">
        <label>Description</label>
        <textarea id="vDesc" style="min-height:60px;">${escapeHTML(v.description)}</textarea>
      </div>
      <div class="form-field">
        <label>Base Price ₹</label>
        <input type="number" id="vPrice" value="${v.basePrice}"/>
      </div>
      <div class="form-field">
        <label>Pricing Unit</label>
        <select id="vUnit">
          <option value="sqft" ${v.unit === 'sqft' ? 'selected' : ''}>sqft</option>
          <option value="Rft" ${v.unit === 'Rft' ? 'selected' : ''}>Rft (running ft)</option>
          <option value="nos" ${v.unit === 'nos' ? 'selected' : ''}>nos</option>
          <option value="pcs" ${v.unit === 'pcs' ? 'selected' : ''}>pieces</option>
          <option value="box" ${v.unit === 'box' ? 'selected' : ''}>box</option>
          <option value="m2" ${v.unit === 'm2' ? 'selected' : ''}>m²</option>
        </select>
      </div>
      <div class="form-field full">
        <label>Colours / Types</label>
        <div id="colorsContainer">${colorsHTML}</div>
        <button class="btn-secondary" type="button" onclick="addColorRow()" style="align-self:flex-start;margin-top:8px;">+ Add Colour</button>
        <div class="hint">Each colour can have a ±₹ price offset from the base price</div>
      </div>
    </div>
  `, () => {
    v.name = $('vName').value;
    v.description = $('vDesc').value;
    v.basePrice = parseFloat($('vPrice').value) || 0;
    v.unit = $('vUnit').value;

    const colors = [];
    const colorInputs = document.querySelectorAll('[data-color-idx]');
    const grouped = {};
    colorInputs.forEach(inp => {
      const idx = inp.getAttribute('data-color-idx');
      const field = inp.getAttribute('data-color-field');
      if (!grouped[idx]) grouped[idx] = {};
      grouped[idx][field] = field === 'offset' ? (parseFloat(inp.value) || 0) : inp.value;
    });
    Object.values(grouped).forEach(c => { if (c.name) colors.push({ name: c.name, hex: c.hex || '#888', offset: c.offset || 0 }); });
    v.colors = colors;

    if (isNew) DATA.varieties.push(v);
    saveData();
    manageVarieties(classId);
    toast(isNew ? 'Variety added' : 'Variety updated');
  });
}

    <div style="text-align:center;padding:12px 0;">
      <div style="width:48px;height:48px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:#e53e3e;fill:none;stroke-width:2;"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>
      </div>
      <div style="font-family:var(--font-display);font-size:18px;margin-bottom:8px;">Delete "${escapeHTML(v.name)}"?</div>
      <div style="font-size:13px;color:var(--ink-soft);">This variety will be permanently removed.</div>
    </div>
  `, () => {
    DATA.varieties = DATA.varieties.filter(x => x.id !== varietyId);
    saveData();
    manageVarieties(classId);
    toast('Variety deleted');
  }, 'Delete');
}

function renderWarrantySettings(body) {
  body.innerHTML = `
    <div class="settings-section">
      <h3>Warranty Templates</h3>
      <div class="sub">5 separate warranty types, each fully editable</div>
      <div style="margin-top:16px;">
        ${Object.keys(DATA.warranties).map(key => {
          const w = DATA.warranties[key];
          return `
            <div class="warranty-card" onclick="editWarranty('${key}')">
              <div class="w-head">
                <div class="w-name">${escapeHTML(w.title)}</div>
                <div class="w-duration">${escapeHTML(w.duration)}</div>
              </div>
              <div class="w-desc">${escapeHTML(w.productInfo.substring(0, 120))}${w.productInfo.length > 120 ? '…' : ''}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function editWarranty(key) {
  const w = DATA.warranties[key];

  showModal('Edit Warranty — ' + w.title, `
    <div class="form-grid full">
      <div class="form-field">
        <label>Title</label>
        <input type="text" id="wTitle" value="${escapeHTML(w.title)}"/>
      </div>
      <div class="form-field">
        <label>Brand / Logo Text</label>
        <input type="text" id="wLogo" value="${escapeHTML(w.logo)}"/>
      </div>
      <div class="form-field">
        <label>Warranty Duration</label>
        <input type="text" id="wDur" value="${escapeHTML(w.duration)}"/>
      </div>
      <div class="form-field">
        <label>Manufacturer / Company Details</label>
        <textarea id="wMan" style="min-height:80px;">${escapeHTML(w.manufacturerDetails)}</textarea>
      </div>
      <div class="form-field">
        <label>Certifications</label>
        <textarea id="wCert" style="min-height:60px;">${escapeHTML(w.certifications)}</textarea>
      </div>
      <div class="form-field">
        <label>Product Information</label>
        <textarea id="wProd" style="min-height:80px;">${escapeHTML(w.productInfo)}</textarea>
      </div>
      <div class="form-field">
        <label>Validity Conditions (one per line)</label>
        <textarea id="wVal" style="min-height:100px;">${escapeHTML(w.validityConditions)}</textarea>
      </div>
      <div class="form-field">
        <label>Exclusions (one per line)</label>
        <textarea id="wExc" style="min-height:100px;">${escapeHTML(w.exclusions)}</textarea>
      </div>
      <div class="form-field">
        <label>Manufacturer Guarantees (one per line)</label>
        <textarea id="wGua" style="min-height:80px;">${escapeHTML(w.guarantees)}</textarea>
      </div>
      <div class="form-field">
        <label>Warranty Period Table</label>
        <div id="seriesContainer">
          ${(w.seriesTable || []).map((s, i) => `
            <div style="display:grid;grid-template-columns:1fr 1fr 30px;gap:8px;margin-bottom:6px;">
              <input type="text" value="${escapeHTML(s.series)}" placeholder="Series" data-series-idx="${i}" data-series-field="series" style="padding:8px 10px;border:1px solid var(--line);border-radius:4px;"/>
              <input type="text" value="${escapeHTML(s.duration)}" placeholder="Duration" data-series-idx="${i}" data-series-field="duration" style="padding:8px 10px;border:1px solid var(--line);border-radius:4px;"/>
              <button onclick="this.parentNode.remove()" style="color:var(--red);">×</button>
            </div>
          `).join('')}
        </div>
        <button class="btn-secondary" onclick="addSeriesRow()" style="margin-top:8px;">+ Add Row</button>
      </div>
    </div>
  `, () => {
    w.title = $('wTitle').value;
    w.logo = $('wLogo').value;
    w.duration = $('wDur').value;
    w.manufacturerDetails = $('wMan').value;
    w.certifications = $('wCert').value;
    w.productInfo = $('wProd').value;
    w.validityConditions = $('wVal').value;
    w.exclusions = $('wExc').value;
    w.guarantees = $('wGua').value;

    const series = [];
    const inputs = document.querySelectorAll('[data-series-idx]');
    const grouped = {};
    inputs.forEach(inp => {
      const idx = inp.getAttribute('data-series-idx');
      const field = inp.getAttribute('data-series-field');
      if (!grouped[idx]) grouped[idx] = {};
      grouped[idx][field] = inp.value;
    });
    Object.values(grouped).forEach(s => { if (s.series) series.push(s); });
    w.seriesTable = series;

    saveData();
    renderSettings();
    toast('Warranty saved');
  });
}

function addSeriesRow() {
  const container = $('seriesContainer');
  const idx = container.children.length;
  const div = document.createElement('div');
  div.style = 'display:grid;grid-template-columns:1fr 1fr 30px;gap:8px;margin-bottom:6px;';
  div.innerHTML = `
    <input type="text" placeholder="Series" data-series-idx="${idx}" data-series-field="series" style="padding:8px 10px;border:1px solid var(--line);border-radius:4px;"/>
    <input type="text" placeholder="Duration" data-series-idx="${idx}" data-series-field="duration" style="padding:8px 10px;border:1px solid var(--line);border-radius:4px;"/>
    <button onclick="this.parentNode.remove()" style="color:var(--red);">×</button>
  `;
  container.appendChild(div);
}

function renderQuotationSettings(body) {
  const s = DATA.settings;
  body.innerHTML = `
    <div class="settings-section">
      <h3>Tax & Discount</h3>
      <div class="sub">Toggle and configure</div>
      <div class="toggle-row">
        <div class="toggle-label">
          <div class="name">GST / Tax</div>
          <div class="desc">Apply tax to quotation totals</div>
        </div>
        <div class="toggle ${s.taxEnabled ? 'on' : ''}" onclick="DATA.settings.taxEnabled = !DATA.settings.taxEnabled; saveData(); renderSettings();"></div>
      </div>
      ${s.taxEnabled ? `
      <div class="form-field" style="max-width:200px;margin-top:14px;">
        <label>Tax Rate (%)</label>
        <input type="number" value="${s.taxRate}" oninput="DATA.settings.taxRate = parseFloat(this.value) || 0; saveData();"/>
      </div>` : ''}
      <div class="toggle-row">
        <div class="toggle-label">
          <div class="name">Discount</div>
          <div class="desc">Allow discount entry on quotations</div>
        </div>
        <div class="toggle ${s.discountEnabled ? 'on' : ''}" onclick="DATA.settings.discountEnabled = !DATA.settings.discountEnabled; saveData(); renderSettings();"></div>
      </div>
    </div>

    <div class="settings-section">
      <h3>Numbering</h3>
      <div class="sub">Custom prefix for quotation and warranty IDs</div>
      <div class="form-grid">
        <div class="form-field">
          <label>Quotation ID Prefix</label>
          <input type="text" id="qPrefix" value="${escapeHTML(s.quotationPrefix)}"/>
        </div>
        <div class="form-field">
          <label>Warranty ID Prefix</label>
          <input type="text" id="wPrefix" value="${escapeHTML(s.warrantyPrefix)}"/>
        </div>
      </div>
      <div style="margin-top:14px;">
        <button class="btn-secondary" onclick="DATA.settings.quotationPrefix = $('qPrefix').value; DATA.settings.warrantyPrefix = $('wPrefix').value; saveData(); toast('Saved');">Save</button>
      </div>
    </div>

    <div class="settings-section">
      <h3>Terms & Conditions Text</h3>
      <div class="sub">Appears at the bottom of every quotation. One condition per line.</div>
      <div class="form-field">
        <textarea id="tcText" style="min-height:240px;">${escapeHTML(s.termsText)}</textarea>
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end;">
        <button class="btn-primary" onclick="DATA.settings.termsText = $('tcText').value; saveData(); toast('Terms saved');">Save Terms</button>
      </div>
    </div>
  `;
}

function renderSecuritySettings(body) {
  const s = DATA.settings;
  body.innerHTML = `
    <div class="settings-section">
      <h3>PIN Lock</h3>
      <div class="sub">Require a 4-digit PIN to access the app on this device</div>
      <div class="toggle-row">
        <div class="toggle-label">
          <div class="name">Enable PIN Protection</div>
          <div class="desc">Will prompt on every app open</div>
        </div>
        <div class="toggle ${s.pinEnabled ? 'on' : ''}" onclick="DATA.settings.pinEnabled = !DATA.settings.pinEnabled; saveData(); renderSettings();"></div>
      </div>
      ${s.pinEnabled ? `
      <div class="form-field" style="max-width:200px;margin-top:14px;">
        <label>Set PIN (4 digits)</label>
        <input type="password" maxlength="6" id="pinSet" value="${escapeHTML(s.pin)}" onchange="DATA.settings.pin = this.value; saveData();"/>
      </div>` : ''}
    </div>

    <div class="settings-section">
      <h3>Data Management</h3>
      <div class="sub">Export, import or reset your data</div>
      <div style="display:flex;gap:10px;margin-top:14px;">
        <button class="btn-secondary" onclick="exportData()">Export Data (JSON)</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">Import Data</button>
        <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(this.files[0])"/>
        <button class="btn-secondary" onclick="resetData()" style="color:var(--red);border-color:var(--red);">Reset Everything</button>
      </div>
      <div style="margin-top:20px;padding-top:18px;border-top:1px solid var(--line);">
        <div style="font-size:13px;font-weight:500;margin-bottom:4px;">Data Overview</div>
        <div style="font-size:12px;color:var(--ink-soft);margin-bottom:12px;">${DATA.classes.length} classes · ${DATA.varieties.length} varieties · ${DATA.quotations.length} quotations · ${DATA.warranty_certificates.length} warranties</div>
        ${(() => {
          try {
            const used = new Blob([localStorage.getItem(STORAGE_KEY) || '']).size;
            const limit = 5 * 1024 * 1024;
            const pct = Math.min(100, Math.round((used / limit) * 100));
            const color = pct > 80 ? '#e53e3e' : pct > 60 ? '#d69e2e' : 'var(--accent)';
            const usedKB = (used / 1024).toFixed(0);
            return `<div class="storage-bar-wrap">
              <div class="storage-bar-label">
                <span>Storage Used</span>
                <span style="font-weight:500;color:${color};">${usedKB} KB / 5,000 KB (${pct}%)</span>
              </div>
              <div class="storage-bar-track">
                <div class="storage-bar-fill" style="width:${pct}%;background:${color};"></div>
              </div>
              ${pct > 80 ? '<div style="margin-top:8px;font-size:11px;color:#c53030;">⚠ Storage is nearly full. Export a backup and consider archiving old quotations.</div>' : ''}
            </div>`;
          } catch(e) { return ''; }
        })()}
      </div>
    </div>
  `;
}

function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nj_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Data exported');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      const qCount = (imported.quotations || []).length;
      const wCount = (imported.warranty_certificates || []).length;
      showModal('Import Data', `
        <div style="text-align:center;padding:12px 0;">
          <div style="font-family:var(--font-display);font-size:18px;margin-bottom:8px;">Import Backup?</div>
          <div style="font-size:13px;color:var(--ink-soft);">The backup contains ${qCount} quotation${qCount !== 1 ? 's' : ''} and ${wCount} warranty certificate${wCount !== 1 ? 's' : ''}.</div>
          <div style="margin-top:12px;font-size:12px;color:var(--ink-soft);">Current data will be replaced.</div>
        </div>
      `, () => {
        DATA = { ...DEFAULT_DATA, ...imported };
        saveData();
        renderSettings();
        toast('Data imported successfully');
      }, 'Import & Replace');
    } catch(err) { toast('Import failed — file may be corrupted or not a valid backup', 'error'); }
  };
  reader.readAsText(file);
}

function resetData() {
  showModal('Reset All Data', `
    <div style="text-align:center;padding:12px 0;">
      <div style="width:48px;height:48px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:#e53e3e;fill:none;stroke-width:2;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div style="font-family:var(--font-display);font-size:18px;margin-bottom:8px;">Reset Everything?</div>
      <div style="font-size:13px;color:var(--ink-soft);">All ${DATA.quotations.length} quotations, ${DATA.warranty_certificates.length} warranties, and all custom products will be permanently deleted. <strong>This cannot be undone.</strong></div>
      <div style="margin-top:16px;padding:12px;background:#fee2e2;border-radius:var(--radius-sm);font-size:12px;color:#c53030;">Export a backup first from Settings → Security → Export Data</div>
    </div>
  `, () => {
    localStorage.removeItem(STORAGE_KEY);
    DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
    saveData();
    renderSettings();
    toast('Data has been reset to defaults');
  }, 'Reset All Data');
}

// ============ MODAL ============
function showModal(title, body, onSave, saveLabel) {
  const modal = $('modal');
  modal.innerHTML = `
    <div class="modal-header">
      <h2>${escapeHTML(title)}</h2>
      <button class="cart-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">${body}</div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">${saveLabel || 'Cancel'}</button>
      ${onSave ? `<button class="btn-primary" id="modalSave">Save</button>` : ''}
    </div>
  `;
  $('modalOverlay').classList.add('open');
  if (onSave) {
    $('modalSave').onclick = () => { onSave(); closeModal(); };
  }
}

function closeModal() {
  $('modalOverlay').classList.remove('open');
}

// ============ PIN ============
function checkPin() {
  if ($('pinInput').value === DATA.settings.pin) {
    $('pinOverlay').style.display = 'none';
    init();
  } else {
    toast('Wrong PIN');
    $('pinInput').value = '';
  }
}

// ============ INIT ============
function init() {
  $('cartBadge').textContent = APP_STATE.cart.length;
  navigate('home');
}

window.addEventListener('DOMContentLoaded', () => {
  if (DATA.settings.pinEnabled) {
    $('pinOverlay').style.display = 'flex';
    $('pinInput').focus();
    $('pinInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkPin();
    });
  } else {
    init();
  }

  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    const modalOpen = $('modalOverlay')?.classList.contains('open');
    const cartOpen = $('cartDrawer')?.classList.contains('open');
    if (modalOpen) closeModal();
    else if (cartOpen) closeCart();
  });
});
</script>

</body>
</html>
